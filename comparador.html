<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparador de Sudaderas</title>

<link rel="stylesheet" href="CSS/comparador.css">

</head>

<body>

<!-- 🔙 BOTÓN REGRESAR -->
<div class="volver">
  <a href="index.html" class="btn-volver">← Volver al inicio</a>
</div>

<h2>Comparación de Sudaderas</h2>

<div class="comparador">
  <div class="tabla">

    <!-- Encabezados -->
    <div class="celda header"></div>

    <div class="celda header producto">
      <img src="IMG/Sudaera clasica.png">
      <p>Sudadera Classic</p>
    </div>

    <div class="celda header producto">
      <img src="IMG/sueter.png">
      <p>Sudadera Pro</p>
    </div>

    <!-- Precio -->
    <div class="celda titulo">Precio</div>
    <div class="celda">Q120</div>
    <div class="celda">Q180</div>

    <!-- Material -->
    <div class="celda titulo">Material</div>
    <div class="celda">Algodón</div>
    <div class="celda">Algodón Premium</div>

    <!-- Tallas -->
    <div class="celda titulo">Tallas</div>
    <div class="celda">S, M, L</div>
    <div class="celda">S, M, L, XL</div>

    <!-- ENVÍO CON BOTÓN -->
    <div class="celda titulo">Envío</div>

    <div class="celda">
      <a href="checkout.htmlge" class="badge disponible">✔ Disponible</a>
    </div>
    <div class="celda">
      <a href="checkout.html" class="badge no-disponible">✘ No disponible</a>
    </div>

  </div>
</div>

</body>
</html>
